<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
    .wrap { max-width: 720px; margin: 48px auto; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 12px 32px rgba(0,0,0,.08); }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { line-height: 1.6; color: #374151; }
    .hint { font-size: 14px; color: #6b7280; }
    .box { margin: 18px 0; padding: 16px; border: 2px dashed #cbd5e1; border-radius: 12px; background: #f8fafc; }
    input[type=file] { display: block; width: 100%; margin-bottom: 14px; }
    button { appearance: none; border: 0; border-radius: 10px; background: #2563eb; color: #fff; padding: 12px 18px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .foot { margin-top: 18px; font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>{{TITLE}}</h1>
      <p>{{DESCRIPTION}}</p>
      <form method="post" enctype="multipart/form-data" action="{{ACTION}}">
        <div class="box">
          <input type="file" name="file" accept="{{ACCEPT}}"{{MULTIPLE}} required>
          <button type="submit">上传并关闭入口</button>
        </div>
      </form>
      <p class="hint">这个入口只接收一次上传，上传完成后会自动关闭。</p>
      <div class="foot">{{FOOTER}}</div>
    </div>
  </div>
</body>
</html>
